# C4K Inventory System — Docker Compose
# Generated config (nginx.conf, .env) are created by setup.sh

version: '3.9'

services:

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: c4k_mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ${DB_NAME:-c4k_inventory}
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── FastAPI Backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: c4k_backend
    restart: unless-stopped
    environment:
      MONGO_URL: mongodb://mongodb:27017
      DB_NAME: ${DB_NAME:-c4k_inventory}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── React Frontend + Nginx ────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # CRITICAL: This must be set in .env (generated by setup.sh) or the frontend
        # will show "undefined" errors when making API calls.
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL:?REACT_APP_BACKEND_URL is required - run setup.sh first}
    container_name: c4k_frontend
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      # Nginx config is generated by setup.sh; mounted here so domain changes
      # only require a container restart, not a full image rebuild.
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/nginx-health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mongodb_data:
    name: c4k_mongodb_data
